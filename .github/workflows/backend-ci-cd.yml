name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGE_TAG: ${{ github.sha }}
  DEPLOYMENT_WEBHOOK_URL: ${{ secrets.DEPLOYMENT_WEBHOOK_URL }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}

jobs:
  test:
    name: Test and Scan Source
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Run unit and integration tests
        run: go test ./...

      - name: Run code quality checks
        run: go vet ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability scan
        run: govulncheck ./...

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: |
            ${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push Docker image
        run: |
          docker push "${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          docker push "${{ secrets.ECR_REPOSITORY }}:latest"

  deploy:
    name: Rolling Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update MongoDB Atlas connection string
        if: env.MONGODB_URI != ''
        run: |
          aws ssm put-parameter \
            --name "/starttech/prod/backend/mongodb_uri" \
            --type SecureString \
            --value "${MONGODB_URI}" \
            --overwrite

      - name: Start ASG instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ secrets.BACKEND_ASG_NAME }}" \
            --strategy Rolling \
            --preferences MinHealthyPercentage=50,InstanceWarmup=120

      - name: Run smoke test
        run: |
          for attempt in {1..20}; do
            if curl -fsS "${{ secrets.BACKEND_BASE_URL }}/healthz"; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Configure CloudWatch deployment marker
        run: |
          aws logs create-log-stream \
            --log-group-name "${{ secrets.BACKEND_LOG_GROUP }}" \
            --log-stream-name "deployments" \
            || true
          aws logs put-log-events \
            --log-group-name "${{ secrets.BACKEND_LOG_GROUP }}" \
            --log-stream-name "deployments" \
            --log-events timestamp=$(date +%s000),message="backend deployment ${{ github.sha }} completed" \
            || true

      - name: Send deployment notification
        if: env.DEPLOYMENT_WEBHOOK_URL != ''
        run: |
          curl -X POST "${DEPLOYMENT_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"service":"backend","status":"deployed","sha":"${{ github.sha }}"}'
